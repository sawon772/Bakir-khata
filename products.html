<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পণ্য ব্যবস্থাপনা - বাকির খাতা</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- html2pdf for PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Hind Siliguri', sans-serif; }
        .btn-primary { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .btn-primary:hover { background: linear-gradient(135deg, #047857 0%, #065f46 100%); }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .low-stock { color: #dc2626; font-weight: bold; }
        .out-of-stock { color: #9ca3af; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        
        @media (max-width: 640px) {
            .table-container { overflow-x: auto; }
            table { font-size: 12px; }
            th, td { padding: 6px 3px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
        }
        
        /* ছবি প্রিভিউ স্টাইল */
        .image-preview-container {
            position: relative;
            display: inline-block;
        }
        .image-preview-container img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #059669;
        }
        .remove-image-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc2626;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            border: none;
        }
        .remove-image-btn:hover { background: #b91c1c; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-white to-teal-50 min-h-screen">
    
    <!-- ============================================ -->
    <!-- HEADER -->
    <!-- ============================================ -->
    <header class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white p-4 shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='index.html'" 
                    class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center text-xl font-bold hover:bg-emerald-600 transition-colors">
                    ←
                </button>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold">📦 পণ্য ব্যবস্থাপনা</h1>
                    <p id="shop-name" class="text-emerald-100 text-xs md:text-sm mt-0.5">বাকির খাতা</p>
                </div>
            </div>
            <button onclick="window.location.href='index.html'" 
                class="bg-white/20 hover:bg-white/30 px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-sm md:text-base transition-colors flex items-center gap-2">
                <span>🏠</span> <span class="hidden sm:inline">হোম</span>
            </button>
        </div>
    </header>

    <!-- ============================================ -->
    <!-- MAIN CONTENT -->
    <!-- ============================================ -->
    <div class="max-w-7xl mx-auto p-3 md:p-4">
        
        <!-- ====== স্ট্যাটস কার্ড ====== -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-4 mb-4 md:mb-6 stats-grid">
            <div class="bg-white rounded-xl p-3 md:p-4 card-shadow text-center">
                <p class="text-[10px] md:text-xs text-gray-500">📦 মোট পণ্য</p>
                <p id="total-products" class="text-xl md:text-2xl font-bold text-emerald-700">০</p>
            </div>
            <div class="bg-white rounded-xl p-3 md:p-4 card-shadow text-center">
                <p class="text-[10px] md:text-xs text-gray-500">✅ স্টকে আছে</p>
                <p id="total-stock" class="text-xl md:text-2xl font-bold text-blue-700">০</p>
            </div>
            <div class="bg-white rounded-xl p-3 md:p-4 card-shadow text-center">
                <p class="text-[10px] md:text-xs text-gray-500">⚠️ কম স্টক (≤৫)</p>
                <p id="low-stock" class="text-xl md:text-2xl font-bold text-red-700">০</p>
            </div>
            <div class="bg-white rounded-xl p-3 md:p-4 card-shadow text-center">
                <p class="text-[10px] md:text-xs text-gray-500">💰 মোট মূল্য</p>
                <p id="total-value" class="text-xl md:text-2xl font-bold text-purple-700">৳০</p>
            </div>
            <div class="bg-white rounded-xl p-3 md:p-4 card-shadow text-center">
                <p class="text-[10px] md:text-xs text-gray-500">📊 মোট বিক্রয়</p>
                <p id="total-sales" class="text-xl md:text-2xl font-bold text-indigo-700">০</p>
            </div>
        </div>
        
        <!-- ====== অ্যাকশন বাটন ====== -->
        <div class="flex flex-wrap gap-2 md:gap-3 mb-4 md:mb-6">
            <button onclick="openAddProductModal()" 
                class="btn-primary text-white px-4 md:px-6 py-2 rounded-xl font-medium hover:shadow-lg transition-all text-sm md:text-base">
                ➕ নতুন পণ্য
            </button>
            <button onclick="openCategoryModal()" 
                class="bg-purple-600 text-white px-4 md:px-6 py-2 rounded-xl font-medium hover:bg-purple-700 transition-all text-sm md:text-base">
                🏷️ ক্যাটাগরি
            </button>
            <button onclick="openSalesReport()" 
                class="bg-indigo-600 text-white px-4 md:px-6 py-2 rounded-xl font-medium hover:bg-indigo-700 transition-all text-sm md:text-base">
                📊 বিক্রয় রিপোর্ট
            </button>
            <button onclick="exportProductsCSV()" 
                class="bg-blue-600 text-white px-4 md:px-6 py-2 rounded-xl font-medium hover:bg-blue-700 transition-all text-sm md:text-base">
                📥 এক্সপোর্ট
            </button>
        </div>
        
        <!-- ====== সার্চ ও ফিল্টার ====== -->
        <div class="bg-white rounded-xl p-3 md:p-4 card-shadow mb-4 md:mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="product-search" placeholder="🔍 নাম বা কোড দিয়ে খুঁজুন..." 
                    class="flex-1 px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-emerald-400 focus:outline-none text-sm md:text-base"
                    oninput="filterProducts()">
                
                <select id="category-filter" onchange="filterProducts()" 
                    class="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-emerald-400 focus:outline-none text-sm md:text-base">
                    <option value="">📂 সব ক্যাটাগরি</option>
                </select>
                
                <select id="stock-filter" onchange="filterProducts()" 
                    class="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-emerald-400 focus:outline-none text-sm md:text-base">
                    <option value="">📊 সব স্টক</option>
                    <option value="low">⚠️ কম স্টক (≤৫)</option>
                    <option value="out">❌ স্টক শেষ (০)</option>
                    <option value="available">✅ স্টকে আছে</option>
                </select>
            </div>
        </div>
        
        <!-- ====== পণ্যের তালিকা ====== -->
        <div class="bg-white rounded-xl p-3 md:p-4 card-shadow">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-bold text-gray-800 text-sm md:text-lg">📋 পণ্যের তালিকা</h2>
                <span id="product-count" class="text-xs md:text-sm text-gray-500">০টি পণ্য</span>
            </div>
            
            <div class="table-container overflow-x-auto">
                <table class="w-full text-xs md:text-sm">
                    <thead class="bg-gray-50 border-b-2 border-gray-200">
                        <tr>
                            <th class="p-2 md:p-3 text-center">#</th>
                            <th class="p-2 md:p-3 text-left">ছবি</th>
                            <th class="p-2 md:p-3 text-left">পণ্যের নাম</th>
                            <th class="p-2 md:p-3 text-left">কোড</th>
                            <th class="p-2 md:p-3 text-left">ক্যাটাগরি</th>
                            <th class="p-2 md:p-3 text-right">ক্রয়মূল্য</th>
                            <th class="p-2 md:p-3 text-right">বিক্রয়মূল্য</th>
                            <th class="p-2 md:p-3 text-center">স্টক</th>
                            <th class="p-2 md:p-3 text-center">বিক্রি</th>
                            <th class="p-2 md:p-3 text-center">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body">
                        <!-- ডায়নামিক্যালি লোড হবে -->
                    </tbody>
                </table>
            </div>
            
            <div id="no-products" class="text-center py-10 text-gray-500 hidden">
                <p class="text-4xl mb-2">📦</p>
                <p>কোনো পণ্য নেই</p>
                <button onclick="openAddProductModal()" class="mt-2 text-emerald-600 hover:underline">
                    ➕ নতুন পণ্য যোগ করুন
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MODAL CONTAINER -->
    <!-- ============================================ -->
    <div id="modal-overlay" class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white w-full max-w-2xl rounded-2xl p-4 md:p-6 max-h-[90vh] overflow-y-auto animate-slide-up">
            <!-- ডায়নামিক্যালি লোড হবে -->
        </div>
    </div>

    <!-- ============================================ -->
    <!-- TOAST CONTAINER -->
    <!-- ============================================ -->
    <div id="toast-container" class="fixed top-20 right-4 z-50 space-y-2"></div>

    <!-- ============================================ -->
    <!-- JAVASCRIPT -->
    <!-- ============================================ -->
    <script>
        // ============================================
        // 🔥 FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBIlO1I012tDbTfERJa9woj9B0qzQ4ZlzI",
            authDomain: "bakir-khara.firebaseapp.com",
            databaseURL: "https://bakir-khara-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bakir-khara",
            storageBucket: "bakir-khara.firebasestorage.app",
            messagingSenderId: "42792295226",
            appId: "1:42792295226:web:b7425942b241736df88e03"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ============================================
        // 🌐 গ্লোবাল ভেরিয়েবল
        // ============================================
        let allProducts = [];
        let productCategories = ['ইলেকট্রনিক্স', 'ফ্যাশন', 'খাদ্য', 'বই', 'অন্যান্য'];
        let currentUser = null;
        let isGuest = false;
        let editingProductId = null;
        let selectedProductImageFile = null;
        let productSalesData = [];

        // ============================================
        // 🔐 অথেন্টিকেশন
        // ============================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                isGuest = false;
                document.getElementById('shop-name').textContent = 'বাকির খাতা';
                loadProducts();
                loadCategories();
                loadSalesData();
            } else {
                // গেস্ট ডাটা লোড
                const guestProducts = localStorage.getItem('guest_products');
                if (guestProducts) {
                    allProducts = JSON.parse(guestProducts);
                    renderProducts();
                    updateStats();
                }
                const guestCats = localStorage.getItem('guest_product_categories');
                if (guestCats) {
                    productCategories = JSON.parse(guestCats);
                }
                const guestSales = localStorage.getItem('guest_product_sales');
                if (guestSales) {
                    productSalesData = JSON.parse(guestSales);
                }
                updateCategoryFilter();
                updateCategorySelect();
            }
        });

        // ============================================
        // 📦 পণ্য লোড (Firebase)
        // ============================================
        function loadProducts() {
            if (!currentUser) return;
            const ref = database.ref(`users/${currentUser.uid}/products`);
            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allProducts = Object.keys(data).map(key => ({
                        ...data[key],
                        __backendId: key
                    }));
                } else {
                    allProducts = [];
                }
                renderProducts();
                updateStats();
            });
        }

        // ============================================
        // 📊 বিক্রয় ডাটা লোড
        // ============================================
        function loadSalesData() {
            if (!currentUser) return;
            const ref = database.ref(`users/${currentUser.uid}/sales`);
            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    productSalesData = Object.keys(data).map(key => ({
                        ...data[key],
                        __backendId: key
                    }));
                } else {
                    productSalesData = [];
                }
                updateStats();
            });
        }

        // ============================================
        // 🏷️ ক্যাটাগরি লোড
        // ============================================
        function loadCategories() {
            if (!currentUser) return;
            const ref = database.ref(`users/${currentUser.uid}/product_categories`);
            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && Array.isArray(data)) {
                    productCategories = data;
                } else if (data && typeof data === 'object') {
                    productCategories = Object.values(data);
                }
                updateCategoryFilter();
                updateCategorySelect();
            });
        }

        // ============================================
        // 💾 পণ্য সেভ
        // ============================================
        async function saveProduct(productData) {
            if (!currentUser && !isGuest) {
                showToast('পণ্য সেভ করতে লগইন করুন', 'error');
                return;
            }
            
            // ছবি আপলোড
            if (selectedProductImageFile) {
                const imageUrl = await uploadProductImage();
                if (imageUrl) {
                    productData.product_image = imageUrl;
                }
            }
            
            if (currentUser) {
                const ref = database.ref(`users/${currentUser.uid}/products`);
                await ref.push().set(productData);
            } else {
                productData.__backendId = 'PROD_' + Date.now();
                allProducts.push(productData);
                localStorage.setItem('guest_products', JSON.stringify(allProducts));
                renderProducts();
                updateStats();
            }
            selectedProductImageFile = null;
            showToast('✅ পণ্য যোগ হয়েছে!', 'success');
        }

        async function updateProduct(productData) {
            // ছবি আপলোড (যদি নতুন ছবি থাকে)
            if (selectedProductImageFile) {
                const imageUrl = await uploadProductImage();
                if (imageUrl) {
                    productData.product_image = imageUrl;
                }
            }
            
            if (currentUser && productData.__backendId) {
                await database.ref(`users/${currentUser.uid}/products/${productData.__backendId}`).set(productData);
            } else {
                const index = allProducts.findIndex(p => p.__backendId === productData.__backendId);
                if (index > -1) {
                    allProducts[index] = productData;
                    localStorage.setItem('guest_products', JSON.stringify(allProducts));
                }
                renderProducts();
                updateStats();
            }
            selectedProductImageFile = null;
            showToast('✅ পণ্য আপডেট হয়েছে!', 'success');
        }

        async function deleteProduct(backendId) {
            if (!confirm('এই পণ্যটি ডিলিট করতে চান?')) return;
            
            if (currentUser) {
                await database.ref(`users/${currentUser.uid}/products/${backendId}`).remove();
            } else {
                const index = allProducts.findIndex(p => p.__backendId === backendId);
                if (index > -1) {
                    allProducts.splice(index, 1);
                    localStorage.setItem('guest_products', JSON.stringify(allProducts));
                }
                renderProducts();
                updateStats();
            }
            showToast('🗑️ পণ্য ডিলিট হয়েছে', 'success');
        }

        // ============================================
        // 📸 ছবি আপলোড ফাংশন
        // ============================================
        function handleProductImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                showToast('ছবির সাইজ ৫MB এর কম হতে হবে', 'error');
                event.target.value = '';
                return;
            }
            
            selectedProductImageFile = file;
            
            // প্রিভিউ দেখান
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('product-image-preview');
                const display = document.getElementById('product-image-display');
                if (preview) preview.classList.remove('hidden');
                if (display) display.src = e.target.result;
            };
            reader.readAsDataURL(file);
            
            showToast('📸 ছবি নির্বাচন করা হয়েছে', 'success');
        }

        function openProductCamera() {
            const input = document.getElementById('product-image-input');
            if (input) {
                input.setAttribute('capture', 'environment');
                input.click();
                setTimeout(() => input.removeAttribute('capture'), 100);
            }
        }

        function removeProductImage() {
            selectedProductImageFile = null;
            const preview = document.getElementById('product-image-preview');
            const input = document.getElementById('product-image-input');
            const urlInput = document.getElementById('product-image-url');
            if (preview) preview.classList.add('hidden');
            if (input) input.value = '';
            if (urlInput) urlInput.value = '';
            showToast('🗑️ ছবি সরানো হয়েছে', 'info');
        }

        async function uploadProductImage() {
            if (!selectedProductImageFile) return null;
            
            const formData = new FormData();
            formData.append('file', selectedProductImageFile);
            formData.append('upload_preset', 'bakir_khata_preset');
            formData.append('cloud_name', 'dtep7yhzl');
            
            try {
                showToast('📤 ছবি আপলোড হচ্ছে...', 'info');
                const response = await fetch('https://api.cloudinary.com/v1_1/dtep7yhzl/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.secure_url) {
                    const urlInput = document.getElementById('product-image-url');
                    if (urlInput) urlInput.value = data.secure_url;
                    showToast('✅ ছবি আপলোড হয়েছে!', 'success');
                    return data.secure_url;
                }
            } catch (error) {
                showToast('❌ ছবি আপলোড ব্যর্থ: ' + error.message, 'error');
                return null;
            }
        }

        // ============================================
        // 🎨 রেন্ডার ফাংশন
        // ============================================
        function renderProducts() {
            const tbody = document.getElementById('products-table-body');
            const noProducts = document.getElementById('no-products');
            const countEl = document.getElementById('product-count');
            
            // ফিল্টার অ্যাপ্লাই
            const searchQuery = document.getElementById('product-search')?.value.toLowerCase() || '';
            const categoryFilter = document.getElementById('category-filter')?.value || '';
            const stockFilter = document.getElementById('stock-filter')?.value || '';
            
            let filtered = allProducts.filter(p => {
                const matchSearch = p.product_name?.toLowerCase().includes(searchQuery) ||
                                   (p.product_code && p.product_code.toLowerCase().includes(searchQuery));
                const matchCategory = !categoryFilter || p.category === categoryFilter;
                let matchStock = true;
                if (stockFilter === 'low') matchStock = p.stock <= 5 && p.stock > 0;
                else if (stockFilter === 'out') matchStock = p.stock === 0;
                else if (stockFilter === 'available') matchStock = p.stock > 0;
                return matchSearch && matchCategory && matchStock;
            });
            
            countEl.textContent = filtered.length + 'টি পণ্য';
            
            if (filtered.length === 0) {
                tbody.innerHTML = '';
                noProducts.classList.remove('hidden');
                return;
            }
            noProducts.classList.add('hidden');
            
            tbody.innerHTML = filtered.map((p, index) => {
                const stockClass = p.stock === 0 ? 'out-of-stock' : (p.stock <= 5 ? 'low-stock' : '');
                const stockDisplay = p.stock === 0 ? 'শেষ ❌' : (p.stock <= 5 ? p.stock + ' ⚠️' : p.stock);
                
                // পণ্যের বিক্রয় সংখ্যা
                const salesCount = productSalesData.filter(s => s.product_id === p.__backendId).length;
                
                return `
                    <tr class="border-b hover:bg-gray-50 transition-colors">
                        <td class="p-2 md:p-3 text-center">${index + 1}</td>
                        <td class="p-2 md:p-3">
                            ${p.product_image ? 
                                `<img src="${p.product_image}" alt="${p.product_name}" class="w-10 h-10 rounded-lg object-cover">` : 
                                `<div class="w-10 h-10 bg-gray-200 rounded-lg flex items-center justify-center text-gray-400 text-xs">📦</div>`
                            }
                        </td>
                        <td class="p-2 md:p-3 font-medium">${escapeHtml(p.product_name)}</td>
                        <td class="p-2 md:p-3 text-xs text-gray-500">${p.product_code || '-'}</td>

        function updateStats() {
            const total = allProducts.length;
            const totalStock = allProducts.reduce((sum, p) => sum + (p.stock || 0), 0);
            const lowStock = allProducts.filter(p => p.stock > 0 && p.stock <= 5).length;
            const totalValue = allProducts.reduce((sum, p) => sum + ((p.sell_price || 0) * (p.stock || 0)), 0);
            const totalSales = productSalesData.length;
            
            document.getElementById('total-products').textContent = total;
            document.getElementById('total-stock').textContent = totalStock;
            document.getElementById('low-stock').textContent = lowStock;
            document.getElementById('total-value').textContent = '৳' + totalValue.toLocaleString('en-IN');
            document.getElementById('total-sales').textContent = totalSales;
        }

        // ============================================
        // 📝 ফর্ম হ্যান্ডলার
        // ============================================
        async function handleProductSubmit(event) {
            event.preventDefault();
            
            const productData = {
                product_name: document.getElementById('product-name').value.trim(),
                product_code: document.getElementById('product-code').value.trim(),
                category: document.getElementById('product-category-select').value,
                buy_price: parseFloat(document.getElementById('buy-price').value) || 0,
                sell_price: parseFloat(document.getElementById('sell-price').value) || 0,
                stock: parseInt(document.getElementById('product-stock').value) || 0,
                description: document.getElementById('product-description').value.trim(),
                supplier: document.getElementById('product-supplier').value.trim(),
                updated_at: new Date().toISOString()
            };
            
            // ছবি ইউআরএল যদি ইতিমধ্যে থাকে
            const imageUrl = document.getElementById('product-image-url')?.value;
            if (imageUrl) {
                productData.product_image = imageUrl;
            }
            
            if (!productData.product_name) {
                showToast('পণ্যের নাম দিন', 'error');
                return;
            }
            if (!productData.category) {
                showToast('ক্যাটাগরি নির্বাচন করুন', 'error');
                return;
            }
            if (productData.buy_price <= 0 || productData.sell_price <= 0) {
                showToast('সঠিক দাম দিন', 'error');
                return;
            }
            
            if (editingProductId) {
                const existing = allProducts.find(p => p.__backendId === editingProductId);
                if (existing) {
                    productData.__backendId = editingProductId;
                    productData.created_at = existing.created_at;
                    await updateProduct(productData);
                }
            } else {
                productData.created_at = new Date().toISOString();
                await saveProduct(productData);
            }
            
            closeModal();
        }

        async function handleStockUpdate(event, productId) {
            event.preventDefault();
            
            const change = parseInt(document.getElementById('stock-change').value);
            const note = document.getElementById('stock-note').value.trim();
            
            if (isNaN(change) || change === 0) {
                showToast('সঠিক সংখ্যা দিন', 'error');
                return;
            }
            
            const product = allProducts.find(p => p.__backendId === productId);
            if (!product) return;
            
            const newStock = (product.stock || 0) + change;
            if (newStock < 0) {
                showToast('স্টক নেগেটিভ হতে পারে না!', 'error');
                return;
            }
            
            product.stock = newStock;
            product.updated_at = new Date().toISOString();
            
            await updateProduct(product);
            showToast(`📦 স্টক আপডেট: ${change > 0 ? '+' : ''}${change} (${newStock})`, 'success');
            closeModal();
        }

        async function addCategory() {
            const input = document.getElementById('new-category-input');
            const name = input.value.trim();
            
            if (!name) {
                showToast('ক্যাটাগরির নাম দিন', 'error');
                return;
            }
            if (productCategories.includes(name)) {
                showToast('এই ক্যাটাগরি ইতিমধ্যে আছে', 'warning');
                return;
            }
            
            productCategories.push(name);

                await database.ref(`users/${currentUser.uid}/product_categories`).set(productCategories);
            } else {
                localStorage.setItem('guest_product_categories', JSON.stringify(productCategories));
            }

            updateCategorySelect();
            showToast('✅ ক্যাটাগরি যোগ হয়েছে', 'success');

        async function deleteCategory(category) {
            if (productCategories.length <= 1) {
                showToast('শেষ ক্যাটাগরি ডিলিট করা যাবে না', 'warning');
                return;
            }
            
            const hasProducts = allProducts.some(p => p.category === category);
            if (hasProducts) {
                showToast(`"${category}" ক্যাটাগরিতে পণ্য আছে! প্রথমে পণ্যের ক্যাটাগরি পরিবর্তন করুন।`, 'error');
                return;
            }
            
            if (!confirm(`"${category}" ডিলিট করতে চান?`)) return;
            
            const index = productCategories.indexOf(category);
            if (index > -1) {
                productCategories.splice(index, 1);
                if (currentUser) {
                    await database.ref(`users/${currentUser.uid}/product_categories`).set(productCategories);
                } else {
                    localStorage.setItem('guest_product_categories', JSON.stringify(productCategories));
                }
                renderCategoryList();
                updateCategoryFilter();
                updateCategorySelect();
                showToast('🗑️ ক্যাটাগরি ডিলিট হয়েছে', 'success');
            }
        }

        function generateSalesReport() {
            // পণ্য ভিত্তিক বিক্রয় ডাটা তৈরি
            const productSales = allProducts.map(product => {
                // এই পণ্যের সব বিক্রয় (productSalesData থেকে)
                const sales = productSalesData.filter(s => s.product_id === product.__backendId);
                
                const quantity = sales.length;
                const revenue = sales.reduce((sum, s) => sum + (s.amount || 0), 0);
                const cost = (product.buy_price || 0) * quantity;
                const profit = revenue - cost;
                const margin = revenue > 0 ? ((profit / revenue) * 100).toFixed(1) : 0;
                
                return {
                    id: product.__backendId,
                    name: product.product_name,
                    quantity: quantity,
                    revenue: revenue,
                    profit: profit,
                    margin: margin
                };
            }).filter(ps => ps.quantity > 0);
            
            // ক্যাটাগরি ভিত্তিক বিক্রয়
            const categorySales = {};
            productSales.forEach(ps => {
                const product = allProducts.find(p => p.__backendId === ps.id);
                const category = product?.category || 'অন্যান্য';
                if (!categorySales[category]) {
                    categorySales[category] = { count: 0, revenue: 0 };
                }
                categorySales[category].count += ps.quantity;
                categorySales[category].revenue += ps.revenue;
            });
            
            const categorySalesArray = Object.keys(categorySales).map(cat => ({
                category: cat,
                count: categorySales[cat].count,
                revenue: categorySales[cat].revenue
            })).sort((a, b) => b.revenue - a.revenue);
            
            const totalSales = productSales.reduce((sum, ps) => sum + ps.quantity, 0);
            const totalRevenue = productSales.reduce((sum, ps) => sum + ps.revenue, 0);
            const totalProfit = productSales.reduce((sum, ps) => sum + ps.profit, 0);
            
            return {
                productSales: productSales.sort((a, b) => b.revenue - a.revenue),
                categorySales: categorySalesArray,
                totalSales: totalSales,
                totalRevenue: totalRevenue,
                totalProfit: totalProfit
            };
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(message, type = 'success', duration = 3000) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            
            const bgColor = type === 'success' ? 'bg-emerald-500' : 
                           type === 'error' ? 'bg-red-500' : 
                           type === 'warning' ? 'bg-yellow-500' : 'bg-blue-500';
            
            const toast = document.createElement('div');
            toast.className = `toast ${bgColor} text-white px-4 py-3 rounded-lg shadow-lg mb-2 animate-slide-up text-sm`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

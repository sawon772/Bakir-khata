<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পণ্য ব্যবস্থাপনা - বাকির খাতা</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- html2pdf for PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Hind Siliguri', sans-serif; }
        
        /* আধুনিক গ্রেডিয়েন্ট বাটন */
        .btn-primary { 
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover { 
            background: linear-gradient(135deg, #047857 0%, #065f46 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(5, 150, 105, 0.4);
        }
        
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            transition: all 0.3s ease;
        }
        .btn-purple:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }
        
        .btn-indigo {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            transition: all 0.3s ease;
        }
        .btn-indigo:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }
        
        .btn-blue {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }
        .btn-blue:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }
        
        .btn-green {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            transition: all 0.3s ease;
        }
        .btn-green:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.4);
        }
        
        /* কার্ড স্টাইল */
        .card-shadow { 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .card-shadow:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        
        /* স্ট্যাটস কার্ড */
        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid rgba(5, 150, 105, 0.1);
            transition: all 0.3s ease;
            cursor: default;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.1);
        }
        .stat-card .stat-icon {
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
        }
        
        /* মডাল */
        .modal-overlay { 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px);
        }
        
        /* অ্যানিমেশন */
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s ease-in-out infinite;
        }
        
        /* টেবিল স্টাইল */
        .table-container {
            border-radius: 16px;
            overflow: hidden;
        }
        table {
            border-collapse: separate;
            border-spacing: 0;
        }
        thead th {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: #1e293b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            border-bottom: 2px solid #e2e8f0;
        }
        tbody tr {
            transition: all 0.2s ease;
            border-bottom: 1px solid #f1f5f9;
        }
        tbody tr:hover {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            transform: scale(1.002);
        }
        tbody td {
            padding: 12px 16px;
            vertical-align: middle;
        }
        
        /* প্রোডাক্ট ইমেজ */
        .product-thumb {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .product-thumb:hover {
            transform: scale(1.1);
            border-color: #059669;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }
        
        /* স্টক ব্যাজ */
        .stock-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .stock-high { background: #dcfce7; color: #166534; }
        .stock-medium { background: #fef3c7; color: #92400e; }
        .stock-low { background: #fee2e2; color: #991b1b; animation: pulse-soft 1.5s ease-in-out infinite; }
        .stock-out { background: #f1f5f9; color: #64748b; }
        
        /* অ্যাকশন বাটন */
        .action-btn {
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: none;
            cursor: pointer;
        }
        .action-btn:hover { transform: scale(1.1); }
        .action-sell { background: #dcfce7; color: #16a34a; }
        .action-sell:hover { background: #16a34a; color: white; box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3); }
        .action-edit { background: #dbeafe; color: #2563eb; }
        .action-edit:hover { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .action-delete { background: #fee2e2; color: #dc2626; }
        .action-delete:hover { background: #dc2626; color: white; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3); }
        .action-stock { background: #f3e8ff; color: #7c3aed; }
        .action-stock:hover { background: #7c3aed; color: white; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3); }
        
        /* ইনপুট ফিল্ড */
        .form-input {
            transition: all 0.3s ease;
            border: 2px solid #e2e8f0;
        }
        .form-input:focus {
            border-color: #059669;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
            outline: none;
        }
        
        /* টোস্ট */
        .toast {
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        /* স্ক্রলবার */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #059669; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #047857; }
        
        /* মোবাইল রেস্পন্সিভ */
        @media (max-width: 640px) {
            .stat-card .stat-icon { font-size: 1.4rem; }
            .stat-card .stat-value { font-size: 1.2rem; }
            .stat-card .stat-label { font-size: 0.6rem; }
            table { font-size: 0.7rem; }
            thead th, tbody td { padding: 6px 8px; }
            .product-thumb { width: 32px; height: 32px; }
            .action-btn { padding: 4px 6px; font-size: 0.7rem; }
            .btn-text { display: none; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-white to-teal-50/30 min-h-screen">
    
    <!-- ============================================ -->
    <!-- HEADER - আধুনিক ডিজাইন -->
    <!-- ============================================ -->
    <header class="bg-gradient-to-r from-emerald-700 via-emerald-600 to-teal-600 text-white p-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='index.html'"

    <!-- ============================================ -->
    <!-- MAIN CONTENT -->
    <!-- ============================================ -->
    <div class="max-w-7xl mx-auto p-3 md:p-6">
        
        <!-- ====== স্ট্যাটস কার্ড ====== -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-5 mb-6">
            <div class="stat-card rounded-2xl p-4 md:p-5 text-center card-shadow">
                <div class="stat-icon">📦</div>
                <p class="stat-label text-[10px] md:text-xs text-gray-500 font-medium uppercase tracking-wider">মোট পণ্য</p>
                <p id="total-products" class="stat-value text-2xl md:text-3xl font-extrabold text-emerald-700">০</p>
            </div>
            <div class="stat-card rounded-2xl p-4 md:p-5 text-center card-shadow">
                <div class="stat-icon">✅</div>
                <p class="stat-label text-[10px] md:text-xs text-gray-500 font-medium uppercase tracking-wider">স্টকে আছে</p>
                <p id="total-stock" class="stat-value text-2xl md:text-3xl font-extrabold text-blue-700">০</p>
            </div>
            <div class="stat-card rounded-2xl p-4 md:p-5 text-center card-shadow">
                <div class="stat-icon">⚠️</div>
                <p class="stat-label text-[10px] md:text-xs text-gray-500 font-medium uppercase tracking-wider">কম স্টক</p>
                <p id="low-stock" class="stat-value text-2xl md:text-3xl font-extrabold text-red-700">০</p>
            </div>
            <div class="stat-card rounded-2xl p-4 md:p-5 text-center card-shadow">
                <div class="stat-icon">💰</div>
                <p class="stat-label text-[10px] md:text-xs text-gray-500 font-medium uppercase tracking-wider">মোট মূল্য</p>
                <p id="total-value" class="stat-value text-2xl md:text-3xl font-extrabold text-purple-700">৳০</p>
            </div>
            <div class="stat-card rounded-2xl p-4 md:p-5 text-center card-shadow">
                <div class="stat-icon">📊</div>
                <p class="stat-label text-[10px] md:text-xs text-gray-500 font-medium uppercase tracking-wider">মোট বিক্রয়</p>

        <!-- ====== অ্যাকশন বাটন ====== -->
        <div class="flex flex-wrap gap-3 md:gap-4 mb-6">
            <button onclick="openAddProductModal()" 
                class="btn-primary text-white px-5 md:px-7 py-2.5 md:py-3 rounded-xl font-semibold hover:shadow-xl transition-all text-sm md:text-base flex items-center gap-2">
                <span>➕</span> <span class="btn-text">নতুন পণ্য</span>
            </button>
            <button onclick="openCategoryModal()" 
                class="btn-purple text-white px-5 md:px-7 py-2.5 md:py-3 rounded-xl font-semibold hover:shadow-xl transition-all text-sm md:text-base flex items-center gap-2">
                <span>🏷️</span> <span class="btn-text">ক্যাটাগরি</span>
            </button>
            <button onclick="openSalesReport()" 
                class="btn-indigo text-white px-5 md:px-7 py-2.5 md:py-3 rounded-xl font-semibold hover:shadow-xl transition-all text-sm md:text-base flex items-center gap-2">
                <span>📊</span> <span class="btn-text">বিক্রয় রিপোর্ট</span>
            </button>
            <button onclick="exportProductsCSV()" 
                class="btn-blue text-white px-5 md:px-7 py-2.5 md:py-3 rounded-xl font-semibold hover:shadow-xl transition-all text-sm md:text-base flex items-center gap-2">
                <span>📥</span> <span class="btn-text">এক্সপোর্ট</span>

        <!-- ====== সার্চ ও ফিল্টার ====== -->
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-4 md:p-5 card-shadow mb-6 border border-white/50">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="product-search" placeholder="🔍 নাম বা কোড দিয়ে খুঁজুন..." 
                    class="form-input flex-1 px-4 md:px-5 py-3 rounded-xl bg-white/50 text-sm md:text-base"
                    oninput="filterProducts()">
                
                <select id="category-filter" onchange="filterProducts()" 
                    class="form-input px-4 md:px-5 py-3 rounded-xl bg-white/50 text-sm md:text-base min-w-[140px]">
                    <option value="">📂 সব ক্যাটাগরি</option>
                </select>
                
                <select id="stock-filter" onchange="filterProducts()" 
                    class="form-input px-4 md:px-5 py-3 rounded-xl bg-white/50 text-sm md:text-base min-w-[140px]">
                    <option value="">📊 সব স্টক</option>
                    <option value="low">⚠️ কম স্টক</option>
                    <option value="out">❌ স্টক শেষ</option>
                    <option value="available">✅ স্টকে আছে</option>
                </select>
            </div>
        </div>
        
        <!-- ====== পণ্যের তালিকা ====== -->
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-4 md:p-6 card-shadow border border-white/50">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-extrabold text-gray-800 text-lg md:text-xl flex items-center gap-2">
                    <span>📋</span> পণ্যের তালিকা
                </h2>
                <span id="product-count" class="text-xs md:text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">০টি পণ্য</span>
            </div>
            
            <div class="table-container overflow-x-auto">
                <table class="w-full text-xs md:text-sm">
                    <thead>
                        <tr>
                            <th class="text-center">#</th>
                            <th class="text-center">ছবি</th>

                            <th class="text-left hidden md:table-cell">ক্যাটাগরি</th>
                            <th class="text-right hidden sm:table-cell">ক্রয়মূল্য</th>
                            <th class="text-right">বিক্রয়মূল্য</th>
                            <th class="text-center">স্টক</th>
                            <th class="text-center hidden lg:table-cell">বিক্রি</th>

            <div id="no-products" class="text-center py-16 text-gray-500 hidden">
                <div class="text-6xl mb-4">📦</div>

                <button onclick="openAddProductModal()" class="mt-3 text-emerald-600 hover:underline font-medium">

    <!-- ============================================ -->
    <!-- MODAL CONTAINER -->
    <!-- ============================================ -->

        <div id="modal-content" class="bg-white w-full max-w-2xl rounded-3xl p-5 md:p-8 max-h-[90vh] overflow-y-auto animate-slide-up shadow-2xl">
            <!-- ডায়নামিক্যালি লোড হবে -->
        </div>
    </div>

    <!-- ============================================ -->
    <!-- TOAST CONTAINER -->
    <!-- ============================================ -->
    <div id="toast-container" class="fixed top-24 right-4 z-50 space-y-2 max-w-sm w-full"></div>

    <!-- ============================================ -->
    <!-- JAVASCRIPT -->
    <!-- ============================================ -->
    <script>
        // ============================================
        // 🔥 FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBIlO1I012tDbTfERJa9woj9B0qzQ4ZlzI",
            authDomain: "bakir-khara.firebaseapp.com",
            databaseURL: "https://bakir-khara-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bakir-khara",
            storageBucket: "bakir-khara.firebasestorage.app",
            messagingSenderId: "42792295226",
            appId: "1:42792295226:web:b7425942b241736df88e03"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ============================================
        // 🌐 গ্লোবাল ভেরিয়েবল
        // ============================================
        let allProducts = [];
        let productCategories = ['ইলেকট্রনিক্স', 'ফ্যাশন', 'খাদ্য', 'বই', 'অন্যান্য'];
        let productSalesData = [];
        let currentUser = null;
        let isGuest = false;
        let editingProductId = null;
        let selectedProductImageFile = null;

        // ============================================
        // 🔐 অথেন্টিকেশন
        // ============================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                isGuest = false;
                document.getElementById('shop-name').textContent = 'বাকির খাতা';
                loadProducts();
                loadCategories();
                loadSalesData();
            } else {
                const guestProducts = localStorage.getItem('guest_products');
                if (guestProducts) {
                    allProducts = JSON.parse(guestProducts);
                    renderProducts();
                    updateStats();
                }
                const guestCats = localStorage.getItem('guest_product_categories');
                if (guestCats) {
                    productCategories = JSON.parse(guestCats);
                }
                const guestSales = localStorage.getItem('guest_product_sales');
                if (guestSales) {
                    productSalesData = JSON.parse(guestSales);
                }
                updateCategoryFilter();
                updateCategorySelect();
            }
        });

        // ============================================
        // 📦 ডাটা লোড
        // ============================================
        function loadProducts() {
            if (!currentUser) return;
            const ref = database.ref(`users/${currentUser.uid}/products`);
            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                allProducts = data ? Object.keys(data).map(key => ({ ...data[key], __backendId: key })) : [];
                renderProducts();
                updateStats();
            });
        }

        function loadSalesData() {
            if (!currentUser) return;
            const ref = database.ref(`users/${currentUser.uid}/sales`);
            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                productSalesData = data ? Object.keys(data).map(key => ({ ...data[key], __backendId: key })) : [];
                updateStats();
            });
        }

        function loadCategories() {
            if (!currentUser) return;
            const ref = database.ref(`users/${currentUser.uid}/product_categories`);
            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && Array.isArray(data)) productCategories = data;
                else if (data && typeof data === 'object') productCategories = Object.values(data);
                updateCategoryFilter();
                updateCategorySelect();
            });
        }

        // ============================================
        // 💾 পণ্য সেভ
        // ============================================
        async function saveProduct(productData) {
            if (!currentUser && !isGuest) {
                showToast('পণ্য সেভ করতে লগইন করুন', 'error');
                return;
            }
            if (selectedProductImageFile) {
                const imageUrl = await uploadProductImage();
                if (imageUrl) productData.product_image = imageUrl;
            }
            if (currentUser) {
                await database.ref(`users/${currentUser.uid}/products`).push().set(productData);
            } else {
                productData.__backendId = 'PROD_' + Date.now();
                allProducts.push(productData);
                localStorage.setItem('guest_products', JSON.stringify(allProducts));
                renderProducts();
                updateStats();
            }
            selectedProductImageFile = null;
            showToast('✅ পণ্য যোগ হয়েছে!', 'success');
        }

        async function updateProduct(productData) {
            if (selectedProductImageFile) {
                const imageUrl = await uploadProductImage();
                if (imageUrl) productData.product_image = imageUrl;
            }
            if (currentUser && productData.__backendId) {
                await database.ref(`users/${currentUser.uid}/products/${productData.__backendId}`).set(productData);
            } else {
                const index = allProducts.findIndex(p => p.__backendId === productData.__backendId);
                if (index > -1) {
                    allProducts[index] = productData;
                    localStorage.setItem('guest_products', JSON.stringify(allProducts));
                }
                renderProducts();
                updateStats();
            }
            selectedProductImageFile = null;
            showToast('✅ পণ্য আপডেট হয়েছে!', 'success');
        }

        async function deleteProduct(backendId) {
            if (!confirm('এই পণ্যটি ডিলিট করতে চান?')) return;
            if (currentUser) {
                await database.ref(`users/${currentUser.uid}/products/${backendId}`).remove();
            } else {
                const index = allProducts.findIndex(p => p.__backendId === backendId);
                if (index > -1) {
                    allProducts.splice(index, 1);
                    localStorage.setItem('guest_products', JSON.stringify(allProducts));
                }
                renderProducts();
                updateStats();
            }
            showToast('🗑️ পণ্য ডিলিট হয়েছে', 'success');
        }

        // ============================================
        // 📸 ছবি আপলোড
        // ============================================
        function handleProductImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                showToast('ছবির সাইজ ৫MB এর কম হতে হবে', 'error');
                event.target.value = '';
                return;
            }
            selectedProductImageFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('product-image-preview');
                const display = document.getElementById('product-image-display');
                if (preview) preview.classList.remove('hidden');
                if (display) display.src = e.target.result;
            };
            reader.readAsDataURL(file);
            showToast('📸 ছবি নির্বাচন করা হয়েছে', 'success');
        }

        function openProductCamera() {
            const input = document.getElementById('product-image-input');
            if (input) {
                input.setAttribute('capture', 'environment');
                input.click();
                setTimeout(() => input.removeAttribute('capture'), 100);
            }
        }

        function removeProductImage() {
            selectedProductImageFile = null;
            const preview = document.getElementById('product-image-preview');
            const input = document.getElementById('product-image-input');
            if (preview) preview.classList.add('hidden');
            if (input) input.value = '';
            showToast('🗑️ ছবি সরানো হয়েছে', 'info');
        }

        async function uploadProductImage() {
            if (!selectedProductImageFile) return null;
            const formData = new FormData();
            formData.append('file', selectedProductImageFile);
            formData.append('upload_preset', 'bakir_khata_preset');
            formData.append('cloud_name', 'dtep7yhzl');
            try {
                const response = await fetch('https://api.cloudinary.com/v1_1/dtep7yhzl/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.secure_url) {
                    document.getElementById('product-image-url').value = data.secure_url;
                    return data.secure_url;
                }
            } catch (error) {
                showToast('❌ ছবি আপলোড ব্যর্থ', 'error');
                return null;
            }
        }

        // ============================================
        // 🎨 রেন্ডার ফাংশন
        // ============================================
        function renderProducts() {
            const tbody = document.getElementById('products-table-body');
            const noProducts = document.getElementById('no-products');
            const countEl = document.getElementById('product-count');
            
            const searchQuery = document.getElementById('product-search')?.value.toLowerCase() || '';
            const categoryFilter = document.getElementById('category-filter')?.value || '';
            const stockFilter = document.getElementById('stock-filter')?.value || '';
            
            let filtered = allProducts.filter(p => {
                const matchSearch = p.product_name?.toLowerCase().includes(searchQuery) ||
                                   (p.product_code && p.product_code.toLowerCase().includes(searchQuery));
                const matchCategory = !categoryFilter || p.category === categoryFilter;
                let matchStock = true;
                if (stockFilter === 'low') matchStock = p.stock <= 5 && p.stock > 0;
                else if (stockFilter === 'out') matchStock = p.stock === 0;
                else if (stockFilter === 'available') matchStock = p.stock > 0;
                return matchSearch && matchCategory && matchStock;
            });
            
            countEl.textContent = filtered.length + 'টি পণ্য';
            
            if (filtered.length === 0) {
                tbody.innerHTML = '';
                noProducts.classList.remove('hidden');
                return;
            }
            noProducts.classList.add('hidden');
            
            tbody.innerHTML = filtered.map((p, index) => {
                // স্টক ক্লাস
                let stockClass = 'stock-high';
                let stockText = p.stock || 0;
                if (p.stock === 0) { stockClass = 'stock-out'; stockText = 'শেষ ❌'; }
                else if (p.stock <= 5) { stockClass = 'stock-low'; stockText = p.stock + ' ⚠️'; }
                
                const salesCount = productSalesData.filter(s => s.product_id === p.__backendId).length;
                
                return `
                    <tr>
                        <td class="text-center font-medium text-gray-500">${index + 1}</td>
                        <td class="text-center">
                            ${p.product_image ? 
                                `<img src="${p.product_image}" alt="${p.product_name}" class="product-thumb">` : 
                                `<div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center text-2xl">📦</div>`
                            }
                        </td>
                        <td class="font-semibold text-gray-800">${escapeHtml(p.product_name)}</td>
                        <td class="hidden sm:table-cell text-gray-500 text-xs">${p.product_code || '-'}</td>
                        <td class="hidden md:table-cell"><span class="bg-gray-100 px-2.5 py-1 rounded-full text-xs font-medium">${escapeHtml(p.category || 'অন্যান্য')}</span></td>
                        <td class="hidden sm:table-cell text-right text-gray-500">৳${(p.buy_price || 0).toLocaleString('en-IN')}</td>
                        <td class="text-right font-semibold text-emerald-600">৳${(p.sell_price || 0).toLocaleString('en-IN')}</td>
                        <td class="text-center"><span class="stock-badge ${stockClass}">${stockText}</span></td>
                        <td class="hidden lg:table-cell text-center font-bold text-indigo-600">${salesCount}</td>
                        <td class="text-center">
                            <div class="flex justify-center gap-1 flex-wrap">
                                <button onclick="openSellModal('${p.__backendId}')" class="action-btn action-sell" title="বিক্রি">💰</button>
                                <button onclick="openEditProductModal('${p.__backendId}')" class="action-btn action-edit" title="এডিট">✏️</button>
                                <button onclick="deleteProduct('${p.__backendId}')" class="action-btn action-delete" title="ডিলিট">🗑️</button>
                                <button onclick="openStockModal('${p.__backendId}')" class="action-btn action-stock" title="স্টক">📦</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats() {
            const total = allProducts.length;
            const totalStock = allProducts.reduce((sum, p) => sum + (p.stock || 0), 0);
            const lowStock = allProducts.filter(p => p.stock > 0 && p.stock <= 5).length;
            const totalValue = allProducts.reduce((sum, p) => sum + ((p.sell_price || 0) * (p.stock || 0)), 0);
            const totalSales = productSalesData.length;
            
            document.getElementById('total-products').textContent = total;
            document.getElementById('total-stock').textContent = totalStock;
            document.getElementById('low-stock').textContent = lowStock;
            document.getElementById('total-value').textContent = '৳' + totalValue.toLocaleString('en-IN');
            document.getElementById('total-sales').textContent = totalSales;
        }

        // ============================================
        // 💰 বিক্রি ফর্ম হ্যান্ডলার
        // ============================================
        async function handleSellSubmit(event, productId) {
            event.preventDefault();
            const product = allProducts.find(p => p.__backendId === productId);
            if (!product) return;
            
            const quantity = parseInt(document.getElementById('sell-quantity').value);
            const date = document.getElementById('sell-date').value;
            const customer = document.getElementById('sell-customer').value.trim();
            const note = document.getElementById('sell-note').value.trim();
            
            if (!quantity || quantity <= 0) {
                showToast('সঠিক সংখ্যা দিন', 'error');
                return;
            }
            if (quantity > product.stock) {
                showToast(`❌ স্টকে ${product.stock} টি আছে!`, 'error');
                return;
            }
            
            // স্টক কমিয়ে দিন
            product.stock = product.stock - quantity;
            product.updated_at = new Date().toISOString();
            await updateProduct(product);
            
            // বিক্রয় ডাটা সেভ
            const sellData = {
                product_id: product.__backendId,
                product_name: product.product_name,
                quantity: quantity,
                amount: quantity * product.sell_price,
                buy_price: product.buy_price,
                sell_price: product.sell_price,
                date: date || new Date().toISOString().split('T')[0],
                customer: customer || '',
                note: note || '',
                created_at: new Date().toISOString()
            };
            
            if (currentUser) {
                await database.ref(`users/${currentUser.uid}/sales`).push().set(sellData);
            } else {
                productSalesData.push(sellData);
                localStorage.setItem('guest_product_sales', JSON.stringify(productSalesData));
            }
            
            showToast(`✅ ${quantity} টি ${product.product_name} বিক্রি হয়েছে!`, 'success');
            closeModal();
            renderProducts();
            updateStats();
        }

        async function handleProductSubmit(event) {
            event.preventDefault();
            const productData = {
                product_name: document.getElementById('product-name').value.trim(),
                product_code: document.getElementById('product-code').value.trim(),
                category: document.getElementById('product-category-select').value,
                buy_price: parseFloat(document.getElementById('buy-price').value) || 0,
                sell_price: parseFloat(document.getElementById('sell-price').value) || 0,
                stock: parseInt(document.getElementById('product-stock').value) || 0,
                description: document.getElementById('product-description').value.trim(),
                supplier: document.getElementById('product-supplier').value.trim(),
                updated_at: new Date().toISOString()
            };
            
            const imageUrl = document.getElementById('product-image-url')?.value;
            if (imageUrl) productData.product_image = imageUrl;
            
            if (!productData.product_name) { showToast('পণ্যের নাম দিন', 'error'); return; }
            if (!productData.category) { showToast('ক্যাটাগরি নির্বাচন করুন', 'error'); return; }
            if (productData.buy_price <= 0 || productData.sell_price <= 0) { showToast('সঠিক দাম দিন', 'error'); return; }
            
            if (editingProductId) {
                const existing = allProducts.find(p => p.__backendId === editingProductId);
                if (existing) {
                    productData.__backendId = editingProductId;
                    productData.created_at = existing.created_at;
                    await updateProduct(productData);
                }
            } else {
                productData.created_at = new Date().toISOString();
                await saveProduct(productData);
            }
            closeModal();
        }

        async function handleStockUpdate(event, productId) {
            event.preventDefault();
            const change = parseInt(document.getElementById('stock-change').value);
            const note = document.getElementById('stock-note').value.trim();
            if (isNaN(change) || change === 0) { showToast('সঠিক সংখ্যা দিন', 'error'); return; }
            
            const product = allProducts.find(p => p.__backendId === productId);
            if (!product) return;
            const newStock = (product.stock || 0) + change;
            if (newStock < 0) { showToast('স্টক নেগেটিভ হতে পারে না!', 'error'); return; }
            
            product.stock = newStock;
            product.updated_at = new Date().toISOString();
            await updateProduct(product);
            showToast(`📦 স্টক আপডেট: ${change > 0 ? '+' : ''}${change} (${newStock})`, 'success');
            closeModal();
        }

        async function deleteCategory(category) {
            if (productCategories.length <= 1) { showToast('শেষ ক্যাটাগরি ডিলিট করা যাবে না', 'warning'); return; }
            const hasProducts = allProducts.some(p => p.category === category);
            if (hasProducts) { showToast(`"${category}" ক্যাটাগরিতে পণ্য আছে!`, 'error'); return; }
            if (!confirm(`"${category}" ডিলিট করতে চান?`)) return;
            
            const index = productCategories.indexOf(category);
            if (index > -1) {
                productCategories.splice(index, 1);
                if (currentUser) {
                    await database.ref(`users/${currentUser.uid}/product_categories`).set(productCategories);
                } else {
                    localStorage.setItem('guest_product_categories', JSON.stringify(productCategories));
                }
                renderCategoryList();
                updateCategoryFilter();
                updateCategorySelect();
                showToast('🗑️ ক্যাটাগরি ডিলিট হয়েছে', 'success');
            }
        }

        function generateSalesReport() {
            const productSales = allProducts.map(product => {
                const sales = productSalesData.filter(s => s.product_id === product.__backendId);
                const quantity = sales.length;
                const revenue = sales.reduce((sum, s) => sum + (s.amount || 0), 0);
                const cost = (product.buy_price || 0) * quantity;
                const profit = revenue - cost;
                const margin = revenue > 0 ? ((profit / revenue) * 100).toFixed(1) : 0;
                return {
                    id: product.__backendId,
                    name: product.product_name,
                    quantity: quantity,
                    revenue: revenue,
                    profit: profit,
                    margin: margin
                };
            }).filter(ps => ps.quantity > 0);
            
            const categorySales = {};
            productSales.forEach(ps => {
                const product = allProducts.find(p => p.__backendId === ps.id);
                const category = product?.category || 'অন্যান্য';
                if (!categorySales[category]) categorySales[category] = { count: 0, revenue: 0 };
                categorySales[category].count += ps.quantity;
                categorySales[category].revenue += ps.revenue;
            });
            
            const categorySalesArray = Object.keys(categorySales).map(cat => ({
                category: cat,
                count: categorySales[cat].count,
                revenue: categorySales[cat].revenue
            })).sort((a, b) => b.revenue - a.revenue);
            
            const totalSales = productSales.reduce((sum, ps) => sum + ps.quantity, 0);
            const totalRevenue = productSales.reduce((sum, ps) => sum + ps.revenue, 0);
            const totalProfit = productSales.reduce((sum, ps) => sum + ps.profit, 0);
            
            return {
                productSales: productSales.sort((a, b) => b.revenue - a.revenue),
                categorySales: categorySalesArray,
                totalSales: totalSales,
                totalRevenue: totalRevenue,
                totalProfit: totalProfit
            };
        }

        // 📥 CSV/PDF ডাউনলোড
        // ============================================
        function downloadSalesReportCSV() {
            const reportData = generateSalesReport();
            if (reportData.productSales.length === 0) {
                showToast('কোনো বিক্রয় ডাটা নেই', 'warning');
                return;

            const rows = reportData.productSales.map(ps => [ps.name, ps.quantity, ps.revenue, ps.profit, ps.margin]);
            const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `sales_report_${new Date().toISOString().split('T')[0]}.csv`;

        async function downloadSalesReportPDF() {

            const pdfContent = `
                <!DOCTYPE html>

                    .report-date { color: #6b7280; font-size: 14px; margin-top: 5px; }
                    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
                    .summary-card { background: #f0fdf4; padding: 15px; border-radius: 10px; text-align: center; }
                    .summary-card h4 { margin: 0; font-size: 14px; color: #4b5563; }
                    .summary-card .amount { font-size: 22px; font-weight: bold; color: #065f46; }
                    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
                    th, td { border: 1px solid #e5e7eb; padding: 10px 12px; text-align: left; }
                    th { background: #f3f4f6; font-weight: 600; }
                    .text-right { text-align: right; }
                    .text-center { text-align: center; }
                    .profit-positive { color: #059669; }
                    .profit-negative { color: #dc2626; }
                    .footer { text-align: center; margin-top: 30px; padding-top: 15px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #9ca3af; }
                </style>
                </head>
                <body>
                    <div class="header">
                        <h1 class="shop-name">📊 পণ্য বিক্রয় রিপোর্ট</h1>
                        <p class="shop-name" style="font-size:18px;color:#374151;">${shopName}</p>
                        <p class="report-date">তারিখ: ${currentDate}</p>
                    </div>
                    <div class="summary-grid">
                        <div class="summary-card"><h4>📦 মোট বিক্রয়</h4><div class="amount">${reportData.totalSales} টি</div></div>
                        <div class="summary-card"><h4>💰 মোট আয়</h4><div class="amount">৳${reportData.totalRevenue.toLocaleString('en-IN')}</div></div>
                        <div class="summary-card"><h4>📈 মোট লাভ</h4><div class="amount">৳${reportData.totalProfit.toLocaleString('en-IN')}</div></div>

                    <h3>📋 পণ্য ভিত্তিক বিক্রয় বিবরণ</h3>
                    <table>

                        <tbody>
                            ${reportData.productSales.map(ps => `
                                <tr>

                                    <td class="text-center">${ps.quantity}</td>
                                    <td class="text-right">৳${ps.revenue.toLocaleString('en-IN')}</td>

                                    <td class="text-right">${ps.margin}%</td>

                        </tbody>
                    </table>
                    ${reportData.categorySales.length > 0 ? `
                    <h3 style="margin-top:25px;">📂 ক্যাটাগরি ভিত্তিক বিক্রয়</h3>
                    <table>
                        <thead><tr><th>ক্যাটাগরি</th><th class="text-center">বিক্রি</th><th class="text-right">আয়</th></tr></thead>
                        <tbody>

            try {

        // ============================================
        // 📥 এক্সপোর্ট
        // ============================================
        function exportProductsCSV() {
            if (allProducts.length === 0) { showToast('কোনো পণ্য নেই', 'warning'); return; }
            const headers = ['নাম', 'কোড', 'ক্যাটাগরি', 'ক্রয়মূল্য', 'বিক্রয়মূল্য', 'স্টক', 'বিবরণ', 'সরবরাহকারী', 'ছবি'];
            const rows = allProducts.map(p => [
                p.product_name, p.product_code || '', p.category || '',
                p.buy_price || 0, p.sell_price || 0, p.stock || 0,
                p.description || '', p.supplier || '', p.product_image || ''
            ]);
            const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `products_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('📥 CSV ডাউনলোড হয়েছে!', 'success');
        }

        // ============================================
        // 🛠️ ইউটিলিটি ফাংশন
        // ============================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(message, type = 'success', duration = 3500) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const bgColor = type === 'success' ? 'bg-emerald-500' : 
                           type === 'error' ? 'bg-red-500' : 
                           type === 'warning' ? 'bg-yellow-500' : 'bg-blue-500';
            const toast = document.createElement('div');
            toast.className = `toast ${bgColor} text-white px-5 py-3.5 rounded-2xl shadow-xl mb-2 text-sm font-medium backdrop-blur-sm`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        // ============================================
        // 🚀 পেজ লোড হলে
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            updateCategorySelect();
            updateCategoryFilter();
        });

        document.getElementById('modal-overlay')?.addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') closeModal();
        });

        console.log('✅ পণ্য ব্যবস্থাপনা পেজ লোড হয়েছে!');
        console.log('📦 মোট পণ্য:', allProducts.length);
    </script>
